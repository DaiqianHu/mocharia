<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Mocha Rush! — brew, steam, top and cannoli your way to Coffee Legend in this playful coffee shop game.">
<meta name="theme-color" content="#160d0b">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
<link rel="manifest" href="%BASE_URL%manifest.webmanifest">
<link rel="apple-touch-icon" href="%BASE_URL%icons/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mocha Rush">
<title>Mocha Rush! — Coffee Shop Simulator</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#160d0b;}
  /* #game3d is the WebGL scene, CSS-positioned to exactly cover the
     letterbox rect (see core/canvas.js). #game is the 2D HUD/UI on top,
     full-window and transparent, so it keeps receiving all pointer events. */
  #game3d{position:fixed;left:0;top:0;display:block;pointer-events:none;background:transparent;}
  #game{position:fixed;inset:0;display:block;touch-action:none;cursor:pointer;background:transparent;}
</style>
</head>
<body>
<canvas id="game3d"></canvas>
<canvas id="game"></canvas>
<script type="module" src="/src/main.js"></script>
</body>
</html>
