<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mocha Rush! — Coffee Shop Simulator</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#160d0b;}
  /* #game3d is the WebGL scene, CSS-positioned to exactly cover the
     letterbox rect (see core/canvas.js). #game is the 2D HUD/UI on top,
     full-window and transparent, so it keeps receiving all pointer events. */
  #game3d{position:fixed;left:0;top:0;display:block;pointer-events:none;background:transparent;}
  #game{position:fixed;inset:0;display:block;touch-action:none;cursor:pointer;background:transparent;}
</style>
</head>
<body>
<canvas id="game3d"></canvas>
<canvas id="game"></canvas>
<script type="module" src="/src/main.js"></script>
</body>
</html>
