name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
          # co-op room relay (relay/ deployed separately via wrangler).
          # Set the RELAY_URL repo variable to your worker URL, e.g.
          #   wss://mocha-relay.<account>.workers.dev
          # Until it's set, co-op simply needs a local relay (test/relay.mjs).
          RELAY_URL: ${{ vars.RELAY_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
